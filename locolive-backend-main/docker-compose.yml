version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: locolive-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Expose only HTTPS (443) or HTTP (80) to host
      # Change to "443:8080" with TLS certs, or use reverse proxy
      - "127.0.0.1:8081:8080"  # Bind to localhost only - use nginx/caddy reverse proxy
    environment:
      - DB_DRIVER=postgres
      - DB_SOURCE=${DB_SOURCE}
      - SERVER_ADDRESS=0.0.0.0:8080
      - REDIS_ADDRESS=${REDIS_ADDRESS}
      - JWT_SECRET=${JWT_SECRET}
      - TLS_CERT_FILE=${TLS_CERT_FILE}
      - TLS_KEY_FILE=${TLS_KEY_FILE}
      - GIN_MODE=release
    volumes:
      - ./uploads:/app/uploads
      - ./certs:/app/certs:ro  # Mount TLS certs read-only
    entrypoint: ["sh", "/app/start.sh"]
    command: ["/app/server"]
    networks:
      - locolive-net
    restart: unless-stopped
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: locolive-postgres
    # DO NOT expose PostgreSQL port to host - internal network only
    # ports:
    #   - "5433:5432"  # ❌ REMOVE in production
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-privacy_social}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - locolive-net
    restart: unless-stopped
    # Security hardening
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: locolive-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    # DO NOT expose Redis port to host - internal network only
    # ports:
    #   - "6379:6379"  # ❌ REMOVE in production
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - locolive-net
    restart: unless-stopped
    # Security hardening
    security_opt:
      - no-new-privileges:true

networks:
  locolive-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
