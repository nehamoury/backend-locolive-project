services:
  - type: web
    name: locolive-backend
    runtime: docker
    repo: https://github.com/appnitysoftwares/locolive-backend # PLEASE UPDATE THIS
    plan: free
    envVars:
      - key: DB_DRIVER
        value: postgres
      - key: DB_SOURCE
        fromDatabase:
          name: locolive-db
          property: connectionString
      - key: REDIS_ADDRESS
        fromService:
          type: redis
          name: locolive-redis
          property: hostPort
      - key: ACCESS_TOKEN_DURATION
        value: 24h
      - key: REFRESH_TOKEN_DURATION
        value: 24h
      - key: SERVER_ADDRESS
        value: 0.0.0.0:8080
      # Secrets (Enter these in Render Dashboard -> Environment)
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: no-reply@locolive.io
      - key: FRONTEND_URL
        sync: false

  - type: redis
    name: locolive-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

databases:
  - name: locolive-db
    databaseName: privacy_social
    user: postgres
    plan: free
