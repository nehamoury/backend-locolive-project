version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: locolive-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # ports: <-- REMOVED: Nginx handles public traffic
    environment:
      - DB_DRIVER=postgres
      - DB_SOURCE=${DB_SOURCE}
      - SERVER_ADDRESS=0.0.0.0:8080
      - REDIS_ADDRESS=${REDIS_ADDRESS}
      - JWT_SECRET=${JWT_SECRET}
      - TLS_CERT_FILE=${TLS_CERT_FILE}
      - TLS_KEY_FILE=${TLS_KEY_FILE}
      - GIN_MODE=release
    volumes:
      - ./uploads:/app/uploads
      - ./certs:/app/certs:ro
    entrypoint: ["sh", "/app/start.sh"]
    command: ["/app/server"]
    networks:
      - locolive-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

  nginx:
    image: nginx:stable-alpine
    container_name: locolive-nginx
    ports:
      - "8090:80" # Map to 8090 to avoid conflict with port 80 on host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./uploads:/var/www/uploads:ro
    depends_on:
      - app
    networks:
      - locolive-net
    restart: unless-stopped

  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: locolive-postgres
    ports:
      - "5433:5432" # Map to 5433 if host port 5432 is already in use
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-privacy_social}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - locolive-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: locolive-redis
    ports:
      - "6380:6379" # Map to 6380 if host port 6379 is already in use
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - locolive-net
    restart: unless-stopped

networks:
  locolive-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
